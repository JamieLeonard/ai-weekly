<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Noto+Sans+SC:wght@500;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --canary:#ffe14d;
    --blue:#2b50ff;
    --pink:#ff5da2;
    --paper:#fffdf5;
    --ink:#000;
    --bd:4px solid #000;
    --sh:6px 6px 0 #000;
    --sh-lg:10px 10px 0 #000;
  }
  *{box-sizing:border-box;}
  html{ -webkit-text-size-adjust:100%; }
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:"Noto Sans SC","Bricolage Grotesque","PingFang SC","Microsoft YaHei",sans-serif;
    /* dotted brutalist backdrop */
    background-image:radial-gradient(#0000001a 1.5px, transparent 1.6px);
    background-size:22px 22px;
    overflow-x:hidden;
  }
  .display{ font-family:"Archivo Black","Bricolage Grotesque","Noto Sans SC",sans-serif; }
  .mono{ font-family:"Space Mono","Noto Sans SC",monospace; }

  .wrap{ max-width:1180px; margin:0 auto; padding:28px 20px 90px; }

  /* ===== Corner badge ===== */
  .badge{
    position:fixed; right:14px; bottom:14px; z-index:99;
    background:var(--pink); color:#000;
    border:3px solid #000; box-shadow:4px 4px 0 #000;
    padding:8px 12px; font-size:13px; font-weight:700;
    transform:rotate(-3deg);
    font-family:"Space Mono","Noto Sans SC",monospace;
    max-width:62vw;
  }
  noscript{
    display:block; margin:18px auto; max-width:720px;
    background:var(--pink); border:3px solid #000; box-shadow:4px 4px 0 #000;
    padding:12px 16px; font-family:"Noto Sans SC",sans-serif; font-weight:900;
  }

  /* ===== Masthead ===== */
  .mast{
    background:var(--canary);
    border:var(--bd); box-shadow:var(--sh-lg);
    padding:30px 30px 26px; position:relative;
    margin-bottom:46px;
    opacity:0; animation:drop .55s cubic-bezier(.2,1.4,.4,1) forwards;
  }
  .mast .kicker{
    display:inline-block; background:#000; color:var(--canary);
    font-family:"Space Mono",monospace; font-weight:700; font-size:13px;
    padding:6px 12px; letter-spacing:.06em; margin-bottom:18px;
    text-transform:uppercase;
  }
  .mast h1{
    margin:0; line-height:.92;
    font-size:clamp(40px,8.6vw,108px);
    letter-spacing:-.02em;
    text-transform:uppercase;
    -webkit-text-stroke:0;
  }
  .mast h1 .l2{
    color:var(--paper);
    -webkit-text-stroke:3px #000;
    paint-order:stroke fill;
  }
  .mast .cn-title{
    display:block; font-family:"Noto Sans SC",sans-serif; font-weight:900;
    font-size:clamp(26px,5vw,54px); letter-spacing:.02em; margin-top:6px;
    line-height:1;
  }
  .mast-meta{
    display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-top:22px;
  }
  .chip{
    border:3px solid #000; background:var(--paper);
    padding:8px 14px; font-weight:700; font-size:15px;
    box-shadow:3px 3px 0 #000;
  }
  .chip.issue{ background:var(--blue); color:#fff; font-family:"Space Mono",monospace; }
  .chip.range{ background:#fff; font-family:"Space Mono",monospace; }
  .chip.tag{ background:var(--pink); }
  .disclaimer{
    position:absolute; top:14px; right:18px;
    font-family:"Space Mono",monospace; font-size:11px; font-weight:700;
    color:#000; opacity:.7; transform:rotate(2deg);
    background:var(--paper); border:2px solid #000; padding:3px 8px;
    max-width:230px; text-align:right; line-height:1.3;
  }

  /* ===== Issue switcher ===== */
  .issue-switcher{
    display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-top:20px;
  }
  .nav-btn,.issue-select{
    appearance:none;
    border:3px solid #000; background:#fff; color:#000;
    box-shadow:3px 3px 0 #000;
    font-family:"Space Mono","Noto Sans SC",monospace; font-weight:700;
    font-size:13px; line-height:1; padding:9px 12px;
  }
  .nav-btn{
    cursor:pointer;
    transition:transform .12s cubic-bezier(.2,1.4,.4,1), box-shadow .12s cubic-bezier(.2,1.4,.4,1);
  }
  .nav-btn:hover:not(:disabled){ transform:translate(-2px,-2px); box-shadow:5px 5px 0 #000; }
  .nav-btn:active:not(:disabled){ transform:translate(1px,1px); box-shadow:2px 2px 0 #000; }
  .nav-btn:disabled{ opacity:.45; cursor:default; }
  .issue-select{
    min-width:240px; max-width:min(100%, 430px);
    background:var(--paper);
    cursor:pointer;
  }

  /* ===== Section ===== */
  .section{ margin-bottom:54px; }
  .sec-head{
    display:flex; align-items:flex-end; gap:16px; flex-wrap:wrap;
    margin-bottom:26px;
  }
  .sec-num{
    font-family:"Archivo Black",sans-serif; font-size:clamp(44px,9vw,88px);
    line-height:.8; color:var(--paper); -webkit-text-stroke:3px #000;
    paint-order:stroke fill;
  }
  .sec-titleblock{
    border:var(--bd); box-shadow:var(--sh); padding:12px 20px;
    transform:rotate(-1deg);
  }
  .sec-titleblock h2{
    margin:0; font-family:"Noto Sans SC",sans-serif; font-weight:900;
    font-size:clamp(24px,4vw,38px); line-height:1; letter-spacing:.01em;
  }
  .sec-titleblock .sub{
    display:block; margin-top:6px; font-family:"Space Mono",monospace;
    font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.03em;
  }
  /* per-section accent */
  .section[data-acc="practice"] .sec-titleblock{ background:var(--canary); }
  .section[data-acc="tools"]    .sec-titleblock{ background:var(--pink); }
  .section[data-acc="frontier"] .sec-titleblock{ background:var(--blue); color:#fff; }
  .section[data-acc="frontier"] .sec-titleblock .sub{ color:var(--canary); }

  /* ===== Items grid ===== */
  .grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:24px;
  }
  .item{
    background:var(--paper);
    border:var(--bd); box-shadow:var(--sh);
    padding:18px 18px 20px; position:relative;
    display:flex; flex-direction:column; min-height:248px;
    transition:transform .12s cubic-bezier(.2,1.4,.4,1), box-shadow .12s cubic-bezier(.2,1.4,.4,1);
    opacity:0; animation:snap .5s cubic-bezier(.2,1.4,.4,1) forwards;
    cursor:pointer; text-decoration:none; color:inherit;
  }
  .item.inert{ cursor:default; }
  .item.inert:hover,.item.inert:active{ transform:none; box-shadow:var(--sh); }
  /* alternate panel tints per item index */
  .item:nth-child(3n+1){ background:var(--paper); }
  .item:nth-child(3n+2){ background:#fff; }
  .item:nth-child(3n+3){ background:var(--paper); }
  .section[data-acc="practice"] .item:nth-child(odd){ background:#fffbe0; }
  .section[data-acc="tools"]    .item:nth-child(even){ background:#fff0f6; }
  .section[data-acc="frontier"] .item:nth-child(3n+2){ background:#eef1ff; }

  .item:hover{
    transform:translate(-4px,-4px);
    box-shadow:var(--sh-lg);
  }
  .item:active{ transform:translate(2px,2px); box-shadow:3px 3px 0 #000; }

  .item-top{
    display:flex; justify-content:space-between; align-items:flex-start; gap:10px;
    margin-bottom:12px;
  }
  .type-row{ display:flex; flex-wrap:wrap; gap:6px; align-items:flex-start; }
  .stype{
    font-family:"Space Mono",monospace; font-weight:700; font-size:11px;
    border:2px solid #000; padding:3px 7px; background:#000; color:#fff;
    text-transform:uppercase; letter-spacing:.04em; white-space:nowrap;
  }
  .agent-sticker{
    font-family:"Space Mono",monospace; font-weight:700; font-size:10.5px;
    border:2px solid #000; padding:3px 7px; background:var(--blue); color:#fff;
    box-shadow:2px 2px 0 #000; transform:rotate(-2deg);
    text-transform:uppercase; letter-spacing:.05em; white-space:nowrap;
  }
  /* heat = rotated loud sticker */
  .heat{
    font-family:"Space Mono",monospace; font-weight:700; font-size:11.5px;
    background:var(--canary); border:2.5px solid #000;
    padding:4px 8px; box-shadow:2px 2px 0 #000;
    transform:rotate(-4deg); white-space:nowrap; align-self:flex-start;
    line-height:1.15;
  }
  .item:nth-child(even) .heat{ background:var(--pink); transform:rotate(3deg); }
  .item:nth-child(3n)  .heat{ background:#fff; }
  .section[data-acc="frontier"] .item .heat{ background:var(--canary); }

  .item h3{
    margin:0 0 4px; font-family:"Bricolage Grotesque","Noto Sans SC",sans-serif;
    font-weight:800; font-size:18px; line-height:1.16; letter-spacing:-.01em;
  }
  .src{
    font-size:12.5px; font-weight:700; opacity:.78; margin-bottom:14px;
    font-family:"Noto Sans SC",sans-serif;
  }
  .src::before{ content:"› "; font-family:"Space Mono",monospace; }

  /* 点评 — the heart, given real weight */
  .comment{
    margin-top:auto;
    border-top:3px solid #000; padding-top:12px; position:relative;
  }
  .comment .lbl{
    display:inline-block; background:#000; color:var(--canary);
    font-family:"Noto Sans SC",sans-serif; font-weight:900; font-size:12px;
    padding:2px 8px; margin-bottom:8px; letter-spacing:.12em;
  }
  .comment p{
    margin:0; font-family:"Noto Sans SC",sans-serif; font-weight:500;
    font-size:14.5px; line-height:1.62; color:#000;
  }

  /* ===== About issue ===== */
  .about{
    border:var(--bd); box-shadow:var(--sh);
    background:#fff; padding:20px; margin:10px 0 34px;
  }
  .about-head{
    display:flex; align-items:flex-end; justify-content:space-between; gap:16px;
    border-bottom:3px solid #000; padding-bottom:12px; margin-bottom:14px;
  }
  .about h2{
    margin:0; font-family:"Noto Sans SC",sans-serif; font-weight:900;
    font-size:24px; line-height:1;
  }
  .about-meta{
    display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;
  }
  .about-chip{
    border:2px solid #000; background:var(--paper);
    padding:5px 8px; font-family:"Space Mono","Noto Sans SC",monospace;
    font-weight:700; font-size:12px; box-shadow:2px 2px 0 #000;
  }
  .health-list{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .health-row{
    border:3px solid #000; background:var(--paper);
    padding:10px 11px; min-height:84px;
  }
  .health-top{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    margin-bottom:8px;
  }
  .health-source{
    font-family:"Space Mono","Noto Sans SC",monospace; font-weight:700;
    font-size:12px; overflow-wrap:anywhere;
  }
  .status{
    border:2px solid #000; padding:2px 6px;
    font-family:"Space Mono",monospace; font-weight:700; font-size:10px;
    box-shadow:2px 2px 0 #000;
  }
  .status-ok{ background:var(--canary); }
  .status-error{ background:var(--pink); }
  .status-skipped{ background:#fff; }
  .health-note{
    margin:0; font-family:"Noto Sans SC",sans-serif; font-weight:500;
    font-size:13px; line-height:1.5; color:#000;
  }
  .issue-notes{
    margin:12px 0 0; border-top:3px dashed #000; padding-top:10px;
    font-family:"Noto Sans SC",sans-serif; font-weight:500;
    font-size:14px; line-height:1.55;
  }

  /* ===== Feedback vote ===== */
  .feedback-card{
    border:var(--bd); box-shadow:var(--sh);
    background:var(--canary); padding:18px 20px 20px;
    margin:10px 0 34px;
  }
  .feedback-head{
    display:flex; align-items:flex-end; justify-content:space-between; gap:14px;
    border-bottom:3px solid #000; padding-bottom:12px; margin-bottom:14px;
  }
  .feedback-card h2{
    margin:0; font-family:"Noto Sans SC",sans-serif; font-weight:900;
    font-size:24px; line-height:1.1;
  }
  .feedback-sub{
    display:inline-block; background:#000; color:var(--canary);
    border:2px solid #000; box-shadow:2px 2px 0 #000;
    padding:4px 8px; font-size:11px; line-height:1;
    white-space:nowrap;
  }
  .feedback-options{
    display:grid; grid-template-columns:repeat(3,1fr); gap:12px;
  }
  .feedback-option{
    appearance:none; border:3px solid #000; box-shadow:3px 3px 0 #000;
    background:#fff; color:#000; min-height:48px; padding:10px 12px;
    font-family:"Noto Sans SC","Bricolage Grotesque",sans-serif;
    font-size:15px; font-weight:900; line-height:1.2;
    cursor:pointer;
    transition:transform .12s cubic-bezier(.2,1.4,.4,1), box-shadow .12s cubic-bezier(.2,1.4,.4,1);
  }
  .feedback-option[data-option="tools"]{ background:var(--pink); }
  .feedback-option[data-option="frontier"]{ background:var(--blue); color:#fff; }
  .feedback-option:hover:not(:disabled){ transform:translate(-3px,-3px); box-shadow:6px 6px 0 #000; }
  .feedback-option:active:not(:disabled){ transform:translate(1px,1px); box-shadow:2px 2px 0 #000; }
  .feedback-option:disabled{ opacity:.62; cursor:default; }
  .feedback-thanks{
    border:3px solid #000; box-shadow:3px 3px 0 #000;
    background:#000; color:var(--canary);
    padding:13px 14px; font-family:"Noto Sans SC",sans-serif;
    font-size:15px; font-weight:900; line-height:1.35;
  }
  .note-form{
    margin-top:16px; border-top:3px solid #000; padding-top:14px;
  }
  .note-top{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    margin-bottom:10px;
  }
  .note-form h3{
    margin:0; font-family:"Noto Sans SC",sans-serif; font-weight:900;
    font-size:18px; line-height:1.2;
  }
  .note-count{
    flex:0 0 auto;
    border:2px solid #000; background:#fff; box-shadow:2px 2px 0 #000;
    padding:4px 8px; font-size:12px; font-weight:700; line-height:1;
  }
  .note-count.is-over{ background:var(--pink); color:#000; }
  .note-text{
    width:100%; min-height:112px; resize:vertical;
    border:3px solid #000; box-shadow:3px 3px 0 #000;
    background:var(--paper); color:#000;
    padding:10px 12px;
    font-family:"Noto Sans SC","Bricolage Grotesque",sans-serif;
    font-size:14.5px; font-weight:500; line-height:1.55;
  }
  .note-text:focus,.note-submit:focus-visible{
    outline:3px solid var(--blue); outline-offset:2px;
  }
  .note-actions{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    margin-top:12px;
  }
  .note-message{
    margin:0; min-height:20px;
    font-family:"Noto Sans SC",sans-serif; font-size:13px;
    font-weight:900; line-height:1.35; color:#000;
  }
  .note-submit{
    appearance:none; border:3px solid #000; box-shadow:3px 3px 0 #000;
    background:var(--blue); color:#fff;
    padding:9px 16px;
    font-family:"Noto Sans SC","Bricolage Grotesque",sans-serif;
    font-size:15px; font-weight:900; line-height:1;
    cursor:pointer;
    transition:transform .12s cubic-bezier(.2,1.4,.4,1), box-shadow .12s cubic-bezier(.2,1.4,.4,1);
  }
  .note-submit:hover:not(:disabled){ transform:translate(-3px,-3px); box-shadow:6px 6px 0 #000; }
  .note-submit:active:not(:disabled){ transform:translate(1px,1px); box-shadow:2px 2px 0 #000; }
  .note-submit:disabled{ opacity:.58; cursor:default; }
  .note-thanks{
    margin-top:16px;
    border:3px solid #000; box-shadow:3px 3px 0 #000;
    background:#000; color:var(--canary);
    padding:13px 14px; font-family:"Noto Sans SC",sans-serif;
    font-size:15px; font-weight:900; line-height:1.35;
  }

  /* ===== entrance keyframes ===== */
  @keyframes snap{
    0%{ opacity:0; transform:translateY(26px) scale(.94) rotate(-1.5deg); }
    70%{ opacity:1; transform:translateY(-4px) scale(1.01) rotate(.3deg); }
    100%{ opacity:1; transform:translateY(0) scale(1) rotate(0); }
  }
  @keyframes drop{
    0%{ opacity:0; transform:translateY(-24px) scale(.97); }
    100%{ opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes likeStamp{
    0%{ transform:scale(1); box-shadow:var(--sh); }
    35%{ transform:scale(.94); box-shadow:3px 3px 0 #000; }
    70%{ transform:scale(1.03); box-shadow:var(--sh-lg); }
    100%{ transform:scale(1); box-shadow:var(--sh); }
  }
  @keyframes likeCountPop{
    0%{ transform:scale(1); }
    45%{ transform:scale(1.2); }
    100%{ transform:scale(1); }
  }
  @keyframes likeBurst{
    0%{ opacity:1; transform:translate(-50%,0) scale(.86) rotate(0deg); }
    68%{ opacity:1; transform:translate(calc(-50% + var(--burst-x,0px)), var(--burst-y,-52px)) scale(1.08) rotate(var(--burst-r,0deg)); }
    100%{ opacity:0; transform:translate(calc(-50% + var(--burst-x,0px)), calc(var(--burst-y,-52px) - 10px)) scale(.72) rotate(var(--burst-r,0deg)); }
  }
  @keyframes saveHintSnap{
    0%{ opacity:0; transform:translateY(8px) rotate(-1.5deg); }
    100%{ opacity:1; transform:translateY(0) rotate(-1.5deg); }
  }

  /* footer */
  .foot{
    margin-top:30px; border-top:4px dashed #000; padding-top:18px;
    font-family:"Space Mono",monospace; font-size:12px; font-weight:700;
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; opacity:.85;
  }
  .footer-actions{
    display:flex; justify-content:flex-end; align-items:stretch;
    gap:14px; flex-wrap:wrap;
    margin:22px 0 18px;
    position:relative; overflow:visible;
  }
  .like-box{
    display:flex; justify-content:flex-end;
    margin:22px 0 18px;
    position:relative; overflow:visible;
  }
  .footer-actions .like-box{ margin:0; }
  .like-box-top{
    position:absolute; right:30px; bottom:26px;
    margin:0; z-index:3;
  }
  .like-btn{
    appearance:none; border:var(--bd); box-shadow:var(--sh);
    background:var(--blue); color:#fff;
    padding:12px 16px;
    display:inline-flex; align-items:center; gap:12px;
    font-family:"Noto Sans SC","Bricolage Grotesque",sans-serif;
    font-size:15px; font-weight:900; line-height:1;
    cursor:pointer;
    transition:transform .12s cubic-bezier(.2,1.4,.4,1), box-shadow .12s cubic-bezier(.2,1.4,.4,1);
  }
  .like-btn:hover{ transform:translate(-4px,-4px); box-shadow:var(--sh-lg); }
  .like-btn:active{ transform:translate(2px,2px); box-shadow:3px 3px 0 #000; }
  .like-btn.liked{ background:var(--pink); color:#000; }
  .like-btn.like-stamp{ animation:likeStamp .26s cubic-bezier(.2,1.4,.4,1); }
  .like-count{
    min-width:42px; text-align:center;
    background:#000; color:var(--canary);
    border:2px solid #000; padding:4px 8px;
    box-shadow:2px 2px 0 #000;
    font-size:12px; line-height:1;
  }
  .like-count.like-pop{ animation:likeCountPop .28s cubic-bezier(.2,1.4,.4,1); }
  .like-burst{
    position:absolute; left:var(--burst-left,50%); top:var(--burst-top,0px);
    width:22px; height:22px; display:flex; align-items:center; justify-content:center;
    pointer-events:none; z-index:20;
    background:var(--burst-bg,var(--canary)); color:#000;
    border:2px solid #000; box-shadow:2px 2px 0 #000;
    font-family:"Noto Sans SC","Space Mono",sans-serif; font-size:13px; font-weight:900;
    line-height:1;
    animation:likeBurst .72s cubic-bezier(.16,.85,.28,1) forwards;
  }
  .save-box{
    position:relative; display:flex; justify-content:flex-end;
    overflow:visible;
  }
  .save-btn{
    appearance:none; border:var(--bd); box-shadow:var(--sh);
    background:var(--paper); color:#000;
    padding:12px 16px;
    display:inline-flex; align-items:center; justify-content:center; gap:10px;

    window.localStorage.setItem(noteStorageKey(issue), "1");
  } catch (_error) {
    // Ignore storage failures; the server has already accepted the note.
  }
}

function renderNoteBlock(issue) {
  if (!NOTE_API) {
    return "";
  }

  if (hasNote(issue)) {
    return '<div class="note-thanks" role="status">谢谢，已收到 ❤</div>';
  }

  return ''
    + '<form class="note-form" data-note-state="form">'
    + '<div class="note-top">'
    + '<h3>想多说两句？（选填）</h3>'
    + '<span class="note-count mono">0/' + NOTE_MAX + '</span>'
    + '</div>'
    + '<textarea class="note-text" rows="4" placeholder="想看什么主题、哪里可以更好…" aria-label="自由文本反馈"></textarea>'
    + '<div class="note-actions">'
    + '<p class="note-message" role="status" aria-live="polite"></p>'
    + '<button class="note-submit" type="submit">提交</button>'
    + '</div>'
    + '</form>';
}

function renderFeedbackCard(issue) {
  if (!FEEDBACK_API) {
    return "";
  }

  const body = hasFeedback(issue)
    ? '<div class="feedback-thanks" role="status">谢谢，已记下你的想法 ❤</div>'
    : '<div class="feedback-options" aria-label="反馈投票选项">'
      + FEEDBACK_OPTIONS.map(function(option) {
        return '<button class="feedback-option" type="button" data-option="' + esc(option) + '">' + esc(FEEDBACK_LABELS[option]) + '</button>';
      }).join("")
      + '</div>';

  return ''
    + '<section class="feedback-card" aria-labelledby="feedback-title" data-issue="' + esc(issue) + '">'
    + '<div class="feedback-head">'
    + '<h2 id="feedback-title">下期想多看点什么？</h2>'
    + '<span class="feedback-sub mono">选一个 · 帮我定选题</span>'
    + '</div>'
    + body
    + renderNoteBlock(issue)
    + '</section>';
}

function updateFeedbackCard(issue) {
  if (!FEEDBACK_API) {
    return;
  }
  const slot = document.getElementById("feedback-slot");
  if (slot) {
    slot.innerHTML = renderFeedbackCard(issue);
  }
}

function setFeedbackBusy(busy) {
  document.querySelectorAll(".feedback-option").forEach(function(button) {
    button.disabled = busy;
    button.dataset.busy = busy ? "1" : "0";
  });
}

async function submitFeedback(option) {
  if (!isFeedbackOption(option)) {
    return;
  }

  const issue = currentIssueId;
  if (hasFeedback(issue)) {
    updateFeedbackCard(issue);
    return;
  }
  if (feedbackInFlight) {
    return;
  }

  feedbackInFlight = true;
  setFeedbackBusy(true);
  try {
    const response = await fetch(buildFeedbackUrl(FEEDBACK_API, issue, option), { method: "POST" });
    if (!response.ok) {
      return;
    }
    markFeedback(issue);
    if (currentIssueId === issue) {
      updateFeedbackCard(issue);
    }
  } catch (_error) {
    // Feedback is optional; keep the page usable when the network is unavailable.
  } finally {
    feedbackInFlight = false;
    if (currentIssueId === issue) {
      setFeedbackBusy(false);
    }
  }
}

function updateNoteCount(form) {
  if (!form) {
    return 0;
  }

  const textarea = form.querySelector(".note-text");
  const counter = form.querySelector(".note-count");
  const submit = form.querySelector(".note-submit");
  const count = countNoteCodePoints(textarea ? textarea.value : "");
  const over = count > NOTE_MAX;

  if (counter) {
    counter.textContent = count + "/" + NOTE_MAX;
    counter.classList.toggle("is-over", over);
  }
  if (textarea) {
    textarea.setAttribute("aria-invalid", over ? "true" : "false");
  }
  if (submit) {
    submit.disabled = over || noteInFlight;
  }

  return count;
}

function setNoteBusy(form, busy) {
  if (!form) {
    return;
  }

  const textarea = form.querySelector(".note-text");
  const submit = form.querySelector(".note-submit");
  if (textarea) {
    textarea.disabled = busy;
  }
  if (submit) {
    submit.disabled = busy || updateNoteCount(form) > NOTE_MAX;
    submit.dataset.busy = busy ? "1" : "0";
  }
}

async function submitNote(form) {
  const issue = currentIssueId;
  if (!form || hasNote(issue)) {
    updateFeedbackCard(issue);
    return;
  }
  if (noteInFlight) {
    return;
  }

  const textarea = form.querySelector(".note-text");
  const message = form.querySelector(".note-message");
  const text = textarea ? textarea.value : "";
  if (countNoteCodePoints(text) > NOTE_MAX) {
    if (message) {
      message.textContent = "内容为空或超过 200 字";
    }
    updateNoteCount(form);
    return;
  }

  noteInFlight = true;
  setNoteBusy(form, true);
  if (message) {
    message.textContent = "";
  }

  try {
    const response = await fetch(buildNoteUrl(NOTE_API, issue), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: text })
    });
    if (response.status === 400) {
      if (message) {
        message.textContent = "内容为空或超过 200 字";
      }
      return;
    }
    if (!response.ok) {
      return;
    }
    markNote(issue);
    if (currentIssueId === issue) {
      updateFeedbackCard(issue);
    }
  } catch (_error) {
    // Free-text feedback is optional; keep the page usable when offline.
  } finally {
    noteInFlight = false;
    if (currentIssueId === issue && !hasNote(issue)) {
      setNoteBusy(form, false);
    }
  }
}

function initFeedbackCard() {
  if (!FEEDBACK_API) {
    return;
  }

  const slot = document.getElementById("feedback-slot");
  if (!slot) {
    return;
  }

  slot.addEventListener("click", function(event) {
    const button = event.target.closest(".feedback-option");
    if (!button || !slot.contains(button)) {
      return;
    }
    submitFeedback(button.dataset.option);
  });

  slot.addEventListener("input", function(event) {
    const textarea = event.target.closest(".note-text");
    if (!textarea || !slot.contains(textarea)) {
      return;
    }
    updateNoteCount(textarea.closest(".note-form"));
  });

  slot.addEventListener("submit", function(event) {
    const form = event.target.closest(".note-form");
    if (!form || !slot.contains(form)) {
      return;
    }
    event.preventDefault();
    submitNote(form);
  });
}

function prefersReducedMotion() {
  return Boolean(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches);
}

function restartMotionClass(node, className, duration) {
  node.classList.remove(className);
  void node.offsetWidth;
  node.classList.add(className);
  window.setTimeout(function() {
    node.classList.remove(className);
  }, duration);
}

function playLikeEffect(box, button) {
  if (prefersReducedMotion()) {
    return;
  }

  if (!box || !button) {
    return;
  }

  const countNode = button.querySelector(".like-count");
  restartMotionClass(button, "like-stamp", 300);
  if (countNode) {
    restartMotionClass(countNode, "like-pop", 320);
  }

  const boxRect = box.getBoundingClientRect();
  const buttonRect = button.getBoundingClientRect();
  const baseLeft = buttonRect.left - boxRect.left + buttonRect.width / 2;
  const baseTop = buttonRect.top - boxRect.top - 4;
  const symbols = ["❤", "✦", "❤", "✦", "❤", "❤"];

  symbols.forEach(function(symbol, index) {
    const chip = document.createElement("span");
    const drift = (index - 2.5) * 17 + Math.round((Math.random() - .5) * 10);
    const rise = 46 + Math.round(Math.random() * 22);
    const rotate = -28 + Math.round(Math.random() * 56);

    chip.className = "like-burst";
    chip.textContent = symbol;
    chip.style.setProperty("--burst-left", baseLeft + "px");
    chip.style.setProperty("--burst-top", baseTop + "px");
    chip.style.setProperty("--burst-x", drift + "px");
    chip.style.setProperty("--burst-y", "-" + rise + "px");
    chip.style.setProperty("--burst-r", rotate + "deg");
    chip.style.setProperty("--burst-bg", index % 2 === 0 ? "var(--canary)" : "var(--pink)");
    chip.style.animationDelay = (index * 18) + "ms";
    chip.addEventListener("animationend", function() {
      chip.remove();
    }, { once: true });
    box.appendChild(chip);
    window.setTimeout(function() {
      chip.remove();
    }, 1000);
  });
}

async function loadLikeCount(issueId) {
  try {
    const response = await fetch(buildLikeUrl(LIKE_API, issueId));
    if (!response.ok) {
      return;
    }
    const count = parseLikeCount(await response.json());
    if (count !== null && currentIssueId === issueId) {
      setLikeCount(count);
    }
  } catch (_error) {
    // Keep the button visible and leave the placeholder count in place.
  }
}

async function submitLike(box, button) {
  const issue = currentIssueId;
  if (hasLiked(issue)) {
    setLikedState(true);
    return;
  }
  if (likeInFlight) {
    return;
  }

  likeInFlight = true;
  document.querySelectorAll(".like-btn").forEach(function(node) {
    node.dataset.busy = "1";
  });
  try {
    const response = await fetch(buildLikeUrl(LIKE_API, issue), { method: "POST" });
    if (!response.ok) {
      return;
    }
    const payload = await response.json();
    const count = parseLikeCount(payload);
    if (count !== null && currentIssueId === issue) {
      setLikeCount(count);
    }
    markLiked(issue);
    if (currentIssueId !== issue) {
      return;
    }
    setLikedState(true);
    if (payload.counted === true) {
      playLikeEffect(box, button);
    }
  } catch (_error) {
    // Network failures are non-blocking for the static page.
  } finally {
    likeInFlight = false;
    document.querySelectorAll(".like-btn").forEach(function(node) {
      delete node.dataset.busy;
    });
  }
}

function initLikeButton() {
  if (!LIKE_API) {
    return;
  }

  document.querySelectorAll(".like-btn").forEach(function(button) {
    const box = button.closest(".like-box");
    button.addEventListener("click", function() {
      submitLike(box, button);
    });
  });
}

function isMacDevice() {
  const platform = String(navigator.platform || "");
  const ua = String(navigator.userAgent || "");
  return /Mac/i.test(platform) || /Macintosh/i.test(ua);
}

function isStandaloneDisplay() {
  return Boolean(
    (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches)
    || navigator.standalone === true
  );
}

function currentSaveAction() {
  return resolveSaveAction({
    userAgent: navigator.userAgent || "",
    isMac: isMacDevice(),
    isStandalone: isStandaloneDisplay(),
    canInstall: Boolean(deferredInstallPrompt)
  });
}

function saveNodes() {
  const box = document.querySelector(".save-box");
  return {
    box,
    button: box ? box.querySelector(".save-btn") : null,
    hint: box ? box.querySelector(".save-hint") : null
  };
}

function hideSaveHint() {
  const nodes = saveNodes();
  if (saveHintTimer) {
    window.clearTimeout(saveHintTimer);
    saveHintTimer = null;
  }
  if (nodes.hint) {
    nodes.hint.classList.remove("is-visible");
    nodes.hint.textContent = "";
  }
}

function showSaveHint(message) {
  const nodes = saveNodes();
  if (!nodes.hint || !message) {
    return;
  }
  if (saveHintTimer) {
    window.clearTimeout(saveHintTimer);
  }
  nodes.hint.textContent = message;
  nodes.hint.classList.add("is-visible");
  saveHintTimer = window.setTimeout(hideSaveHint, 4200);
}

function updateSaveButton() {
  const nodes = saveNodes();
  if (!nodes.box) {
    return { mode: "hidden", hint: "" };
  }
  const action = currentSaveAction();
  nodes.box.hidden = action.mode === "hidden";
  if (action.mode === "hidden") {
    hideSaveHint();
  }
  return action;
}

async function handleSaveClick(event) {
  event.preventDefault();
  event.stopPropagation();

  const action = updateSaveButton();
  if (action.mode === "hidden") {
    return;
  }

  if (action.mode === "android-prompt" && deferredInstallPrompt) {
    const promptEvent = deferredInstallPrompt;
    deferredInstallPrompt = null;
    hideSaveHint();
    try {
      if (typeof promptEvent.prompt === "function") {
        await promptEvent.prompt();
      }
    } catch (_error) {
      // Fall back to the Android menu hint on the next click.
    }
    updateSaveButton();
    return;
  }

  showSaveHint(action.hint);
}

function initSaveButton() {
  const nodes = saveNodes();
  if (!nodes.box || !nodes.button) {
    return;
  }

  nodes.button.addEventListener("click", handleSaveClick);
  document.addEventListener("click", function(event) {
    if (!nodes.box.contains(event.target)) {
      hideSaveHint();
    }
  });
  updateSaveButton();
}

window.addEventListener("beforeinstallprompt", function(event) {
  event.preventDefault();
  deferredInstallPrompt = event;
  updateSaveButton();
});

function populateSwitcher() {
  const select = document.getElementById("issue-select");
  select.innerHTML = INDEX.issues.map(function(entry) {
    return '<option value="' + esc(entry.issue) + '">' + esc(entry.issueLabel + " · " + entry.weekRange) + '</option>';
  }).join("");
}

function renderIssue(issue) {
  currentIssueId = issue.issue;
  document.title = "AI 实践周刊 · " + issue.issueLabel;
  document.getElementById("m-issue").textContent = issue.issueLabel;
  document.getElementById("m-range").textContent = issue.weekRange;
  document.getElementById("m-tag").textContent = issue.tagline;
  document.getElementById("m-disc").textContent = issue.notes || "本期数据来自公开来源；agent 调研新增的条目已标注 AGENT。";
  document.getElementById("sections").innerHTML = renderSections(issue);
  document.getElementById("about-slot").innerHTML = renderAbout(issue);
  updateFeedbackCard(issue.issue);
  document.getElementById("f-issue").textContent = issue.issue + " · " + issue.weekRange;

  if (LIKE_API) {
    setLikeCount(null);
    setLikedState(hasLiked(issue.issue));
    loadLikeCount(issue.issue);
  }

  const index = getCurrentIndex();
  document.getElementById("issue-select").value = issue.issue;
  document.getElementById("prev-issue").disabled = index < 0 || index >= ISSUES.length - 1;
  document.getElementById("next-issue").disabled = index <= 0;
}

function setIssue(issueId) {
  const issue = issueById.get(issueId);
  if (issue) {
    renderIssue(issue);
  }
}

function init() {
  populateSwitcher();
  document.getElementById("issue-select").addEventListener("change", function(event) {
    setIssue(event.target.value);
  });
  document.getElementById("prev-issue").addEventListener("click", function() {
    const index = getCurrentIndex();
    if (index >= 0 && index < ISSUES.length - 1) {
      setIssue(ISSUES[index + 1].issue);
    }
  });
  document.getElementById("next-issue").addEventListener("click", function() {
    const index = getCurrentIndex();
    if (index > 0) {
      setIssue(ISSUES[index - 1].issue);
    }
  });
  setIssue(issueById.has(CURRENT) ? CURRENT : ISSUES[0].issue);
  initLikeButton();
  initFeedbackCard();
  initSaveButton();
}

function showInitError(error) {
  const message = error instanceof Error ? error.message : String(error);
  const html = ''
    + '<aside class="about" role="alert">'
    + '<div class="about-head"><h2>页面初始化失败</h2></div>'
    + '<p class="health-note">请检查内联数据格式：' + esc(message) + '</p>'
    + '</aside>';
  const target = document.getElementById("sections") || document.body;
  target.innerHTML = html;
}

try {
  init();
} catch (error) {
  showInitError(error);
}

try {
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function() {
      navigator.serviceWorker.register("sw.js").catch(function() {});
    });
  }
} catch (_error) {
  // Service workers require a supported browser context such as HTTPS.
}

</script>
</body>
